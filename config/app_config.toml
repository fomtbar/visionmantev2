[app]
job_name = "default"
language = "es"
log_level = "INFO"
result_history_max = 200

[camera]
device_index = 0
width = 1280
height = 720
fps = 30
flip_horizontal = false
flip_vertical = false

[vision]
algorithm = "yolo"          # "yolo" | "orb"
model_path = ""             # vacío = sin modelo, usa ORB
confidence_threshold = 0.65
expected_pieces = 1
result_mode = "global"      # "global" | "per_piece"
any_ng_is_global_ng = true
min_cycle_time_ms = 200

[plc]
enabled = false
brand = "mock"              # "siemens" | "mitsubishi" | "mock"
ip = "192.168.0.1"
port = 102
trigger_address = "DB1.DBX0.0"
result_ok_address = "DB1.DBX0.1"
result_ng_address = "DB1.DBX0.2"
result_hold_ms = 500
poll_interval_ms = 20

[rois]
